<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Form – Madison Borough FC</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
color:#222;
}

header{
background:#b30000;
padding:30px;
border-bottom:4px solid gold;
text-align:center;
color:white;
}

header h1{
margin:0;
}

header p{
margin-top:8px;
color:#ffd966;
}

.section{
padding:40px 20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-left:6px solid gold;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:6px;
font-weight:bold;
color:#b30000;
}

input, textarea, select{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
box-sizing:border-box;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
background:#b30000;
color:white;
border:none;
padding:14px 24px;
font-size:16px;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#d60000;
}

footer{
background:#b30000;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
border-top:4px solid gold;
}

</style>
</head>

<body>

<header>
<h1>Madison Borough FC</h1>
<p>Sports Psychologist Application</p>
</header>

<div class="section">

<div class="card">

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel">
</div>

<div class="form-group">
<label>Main Qualification</label>
<input type="text">
</div>

<div class="form-group">
<label>Previous Experience</label>
<textarea></textarea>
</div>

<div class="form-group">
<label>Why are you suitable for this role?</label>
<textarea></textarea>
</div>

<div class="form-group">
<label>DBS Status</label>
<select>
<option>DBS Checked</option>
<option>Willing to Obtain DBS</option>
<option>Not Currently Held</option>
</select>
</div>

<button type="submit">Submit Application</button>

</form>

</div>

</div>

<footer>
© 2026 Madison Borough FC | Careers
</footer>

</body>
</html>
