<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Form – Madison Borough FC</title>

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:#8b0000;
padding:30px;
border-bottom:3px solid gold;
text-align:center;
}

h1{
color:gold;
margin:0;
}

.section{
padding:40px;
max-width:900px;
margin:auto;
}

.card{
background:#1c1c1c;
padding:25px;
border-left:6px solid gold;
border-radius:8px;
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
color:#ffcc66;
font-weight:bold;
}

input, textarea, select{
width:100%;
padding:12px;
background:#222;
border:1px solid #555;
border-radius:6px;
color:white;
}

textarea{
min-height:120px;
}

button{
background:gold;
color:black;
border:none;
padding:14px 24px;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ffd700;
}

</style>
</head>

<body>

<header>
<h1>Madison Borough FC</h1>
<p>Sports Psychologist Application</p>
</header>

<div class="section">

<div class="card">

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text">
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email">
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel">
</div>

<div class="form-group">
<label>Main Qualification</label>
<input type="text">
</div>

<div class="form-group">
<label>Previous Experience</label>
<textarea></textarea>
</div>

<div class="form-group">
<label>Why are you suitable for this role?</label>
<textarea></textarea>
</div>

<div class="form-group">
<label>DBS Status</label>
<select>
<option>DBS Checked</option>
<option>Willing to Obtain DBS</option>
<option>Not Currently Held</option>
</select>
</div>

<button type="submit">Submit Application</button>

</form>

</div>

</div>

</body>
</html>
